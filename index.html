<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        .charts-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chart-card {
            width: 100%;
        }

        .chart-wrap {
            position: relative;
            width: 100%;
            height: 350px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="brand">
        <div class="brand-dot"></div>
        <span class="brand-name">AppName</span>
    </div>
    <span class="nav-tag">Analytics Dashboard</span>
</nav>

<div class="page">
    <div class="page-header">
        <h2>Analytics Overview</h2>
        <p>Monitor feature usage and trends across your user base</p>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
        <div class="filter-group">
            <label>Date From</label>
            <input type="date" id="startDate">
        </div>
        <div class="filter-group">
            <label>Date To</label>
            <input type="date" id="endDate">
        </div>
        <div class="filter-group">
            <label>Age Group</label>
            <select id="ageFilter">
                <option value="">All ages</option>
                <option value="<18">Under 18</option>
                <option value="18-40">18 – 40</option>
                <option value=">40">Over 40</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Gender</label>
            <select id="genderFilter">
                <option value="">All genders</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <button class="filter-apply" onclick="loadAnalytics()">Apply Filters</button>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
        <div class="chart-card">
            <div class="chart-card-header">
                <div>
                    <div class="chart-card-title">Feature Usage</div>
                    <div class="chart-card-sub">Usage breakdown by feature</div>
                </div>
                <span class="chart-badge badge-bar">Bar Chart</span>
            </div>
            <div class="chart-wrap">
                <canvas id="barChart"></canvas>
            </div>
        </div>

        <div class="chart-card">
            <div class="chart-card-header">
                <div>
                    <div class="chart-card-title">Time Trend</div>
                    <div class="chart-card-sub">Activity over selected period</div>
                </div>
                <span class="chart-badge badge-line">Line Chart</span>
            </div>
            <div class="chart-wrap">
                <canvas id="lineChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="js/chart.js"></script>
<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/track.js"></script>
</body>
</html>
