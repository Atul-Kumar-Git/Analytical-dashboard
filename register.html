<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; padding: 24px; }
        button[type="submit"] { width: 100%; margin-top: 8px; }
    </style>
</head>
<body>

<div class="card">
    <div class="brand">
        <div class="brand-dot"></div>
        <span class="brand-name">AppName</span>
    </div>

    <h2>Create account</h2>
    <p class="subtitle">Fill in the details below to get started</p>

    <form id="registerForm">
        <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="e.g. johndoe" required>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Min. 8 characters" required>
        </div>

        <div class="row">
            <div class="field">
                <label for="age">Age</label>
                <input type="number" id="age" placeholder="25" required>
            </div>
            <div class="field">
                <label for="gender">Gender</label>
                <div class="select-wrap">
                    <select id="gender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
        </div>

        <button type="submit">Create Account →</button>
    </form>

    <hr class="divider">

    <p class="footer-text">Already have an account? <a href="login.html">Sign in</a></p>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
