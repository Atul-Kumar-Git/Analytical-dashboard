<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; padding: 24px; }
        button[type="submit"] { width: 100%; margin-top: 8px; }
    </style>
</head>
<body>

<div class="card">
    <div class="brand">
        <div class="brand-dot"></div>
        <span class="brand-name">AppName</span>
    </div>

    <div class="welcome-badge"><span>👋</span> Welcome back</div>

    <h2>Sign in</h2>
    <p class="subtitle">Enter your credentials to access your account</p>

    <form id="loginForm">
        <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Your username" required>
        </div>

        <div class="field">
            <div class="field-password-label">
                <label for="password" style="margin-bottom:0">Password</label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit">Sign In →</button>
    </form>

    <hr class="divider">

    <p class="footer-text">Don't have an account? <a href="register.html">Register now</a></p>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
